<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="contactUs.css">
    <title>Contact Us - TravelBloom</title>
</head>
<body>

    <!-- Menú de Navegación -->
    <nav class="navbar">
        <div class="logo-container">
            <div class="logo-icon">🌐✈️</div>
            <span class="brand-name">TravelBloom</span>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="aboutUs.html">About Us</a></li>
            <li><a href="contactUs.html">Contact Us</a></li>
        </ul>
    </nav>

    <!-- Contenido Principal -->
    <main class="hero-section contact-page">
  
        <!-- Barra lateral de redes sociales -->
        <aside class="social-sidebar">
            <a href="#" aria-label="Twitter">🕊️</a>
            <a href="#" aria-label="Facebook">📘</a>
            <a href="#" aria-label="Instagram">📸</a>
            <a href="#" aria-label="YouTube">📺</a>
        </aside>

        <!-- Contenedor dividido en dos columnas -->
        <div class="contact-container">
            
            <!-- Columna Izquierda: Títulos -->
            <div class="contact-info">
                <h1 class="contact-title">CONTACT US</h1>
                <p class="contact-subtitle">Get in touch</p>
            </div>

            <!-- Columna Derecha: Formulario -->
            <div class="contact-form-container">
                <form class="contact-form">
                    
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" placeholder="Enter your name" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="Enter your email" required>
                    </div>

                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" rows="5" placeholder="Enter your message" required></textarea>
                    </div>

                    <button type="submit" class="btn-submit">Submit</button>
                </form>
            </div>

        </div>
    </main>

</body>
</html>
